<div class="login-shell">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon"><ion-icon name="paw-outline" /></div>
      <h1>MascotaCare</h1>
      <p>Atención primaria para tus mascotas</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <app-form-field label="Email" [required]="true" [error]="err('email')">
        <input type="email" formControlName="email" placeholder="tucorreo@email.com" />
      </app-form-field>
      <app-form-field label="Contraseña" [required]="true" [error]="err('password')">
        <input type="password" formControlName="password" placeholder="••••••••" />
      </app-form-field>
      <app-button type="submit" [full]="true" [disabled]="loading()">
        Iniciar sesión
      </app-button>
    </form>

    <div class="divider"><span>o prueba demo</span></div>

    <div class="quick-actions">
      <app-button variant="outline" [full]="true" icon="person-outline"
                  [disabled]="loading()" (click)="quickLogin('dueno')">
        Entrar como Dueño
      </app-button>
      <app-button variant="outline" [full]="true" icon="shield-checkmark-outline"
                  [disabled]="loading()" (click)="quickLogin('admin')">
        Entrar como Admin
      </app-button>
    </div>
  </div>
</div>
